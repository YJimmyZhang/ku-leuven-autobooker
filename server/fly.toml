# fly launch --name ku-leuven-autobooker --region ams --no-deploy
# fly secrets set SECRET_KEY=your-secret-here
# fly deploy

app = "ku-leuven-autobooker"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  TZ = "Europe/Brussels"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
